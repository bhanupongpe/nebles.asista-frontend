  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const gasApiUrl = "https://script.google.com/macros/s/AKfycbxbg_c1iJFrHDsRW_wFzpk1ikQx_6kSkVkCWY9Oxcyu7UgOv8uO2LyM3OkoGtHU7doQ/exec";
    const cid = urlParams.get('cid') || ""; 
    const rawReq = urlParams.get('req') || ""; 

    let loadedProperties = [];
    let selectedIndices = new Set();
    let displayLimit = 5; 
    let reqMonths = 12; 
    let userContactMethod = ""; 
    let userLineId = "";
    let userWhatsapp = "";
    let alreadyRequestedIds = []; 

// ==========================================
// 🌐 1. ระบบแปลภาษาแปลให้ครบ (i18n Dictionary)
// ==========================================
const i18n = {
    TH: { title: "ห้องที่คัดสรรมาให้สำหรับคุณ", subtitle: "Nebles กำลังคัดเลือกห้องที่ดีที่สุดสำหรับคุณ", loading: "AI กำลังค้นหาห้องที่ตรงกับคุณจริงๆ..", match: "ตรงสเปค", rented: "ปล่อยเช่าแล้ว", petFriendly: "รับสัตว์เลี้ยง", map: "แผนที่", chat: "แชท", size: "ขนาด", floor: "ชั้น", sqm: "ตร.ม.", month: "เดือน", loadMore: "ดูห้องเพิ่มเติม", selected: "ห้องที่เลือก", requestBooking: "ยืนยันความสนใจ", priceFor: "สำหรับสัญญา", priceInfo: "ราคาสำหรับสัญญา", bookingCheck: "กำลังตรวจสอบห้องพักที่คุณจอง<br>เจ้าหน้าที่จะติดต่อกลับโดยเร็วที่สุด" },
    EN: { title: "Recommended for You", subtitle: "Nebles is selecting the best units for you", loading: "AI is finding homes that actually fit you..", match: "Match", rented: "RENTED OUT", petFriendly: "Pet Friendly", map: "Map", chat: "Chat", size: "Size", floor: "Fl", sqm: "sqm", month: "month", loadMore: "Load More Properties", selected: "Selected", requestBooking: "Request Booking", priceFor: "For", priceInfo: "Price for", bookingCheck: "Final check on your booked.<br>Please wait for our staff to contact you soon." },
    CN: {
        title: "为您推荐",
        subtitle: "Nebles 正在为您挑选最佳房源",
        loading: "AI 正在寻找真正适合您的房源..",
        match: "匹配度",
        rented: "已出租",
        petFriendly: "允许宠物",
        map: "地图",
        chat: "聊天",
        size: "面积",
        floor: "楼层",
        sqm: "平方米",
        month: "月",
        loadMore: "加载更多房源",
        selected: "已选择",
        requestBooking: "请求预订",
        priceFor: "租期为",
        priceInfo: "价格及租期：",
	      bookingCheck: "正在确认您的预订。<br>工作人员会尽快与您联系。"
    }
};

let currentLang = "EN"; 
let exchangeRates = { THB: 1, USD: 0.028, CNY: 0.20 }; 
const currencySymbols = { TH: "฿", EN: "$", CN: "¥" };

async function fetchExchangeRates() {
    try {
        const res = await fetch('https://api.exchangerate-api.com/v4/latest/THB');
        const data = await res.json();
        exchangeRates.USD = data.rates.USD;
        exchangeRates.CNY = data.rates.CNY;
        console.log("💰 อัปเดตเรทเงินสำเร็จ:", exchangeRates);
    } catch (e) {
        console.log("⚠️ ดึงเรทเงินพัง! ใช้เรทสำรอง", e);
    }
}

function changeLanguageAndCurrency(langCode) {
    currentLang = langCode;
    const t = i18n[currentLang];
    document.querySelector('.req-title').innerText = t.title;
    document.querySelector('.req-subtitle').innerText = t.subtitle;
    document.querySelector('.typing-cursor').innerText = t.loading;
    document.querySelector('#load-more-container button').innerHTML = `${t.loadMore} <i class="bi bi-chevron-down"></i>`;
    document.querySelector('.btn-booking').innerHTML = `${t.requestBooking} <i class="bi bi-arrow-right"></i>`;
    updateFloatingBar(); 
    if (loadedProperties.length > 0) renderProperties();
}

function parseInitialReq() {
    let matchContract = rawReq.match(/(\d+)\s*month/i); 
    if (matchContract) reqMonths = parseInt(matchContract[1].trim()) || 12;
}

// 🚨 [อัปเกรด] ฟังก์ชันเปิดตัวแบบ Premium Reveal
function revealContent(textToType) {
    const loadingContainer = document.getElementById('loading-container');
    const propertyContainer = document.getElementById('property-container');
    const summaryContainer = document.getElementById('req-summary');
    const typeArea = document.getElementById('loading-msg-state');

    typeArea.innerHTML = textToType; 
    typeArea.classList.remove('typing-cursor');

    // 1. สั่งให้หน้า Loading ค่อยๆ จางหายไป (Fade out)
    loadingContainer.classList.add('fade-element', 'fade-out');

    // 2. รอให้มันจางจนสุด (0.5 วิ) แล้วค่อยเอาของจริงขึ้นมาโชว์
    setTimeout(() => {
        loadingContainer.style.display = 'none';
        
        summaryContainer.style.display = 'block';
        propertyContainer.style.display = 'block';
        
        // ใส่คลาส Fade-in ให้ตารางค่อยๆ ลอยขึ้นมาแบบสมูทๆ
        summaryContainer.classList.add('fade-in');
        propertyContainer.classList.add('fade-in');
        
        renderProperties();
    }, 500); 
}

function fetchData() {
    if (!cid) { showNoResult(); return Promise.resolve(); }
    
    // 🚀 [อัปเกรด] หยิบ Promise ที่เราแอบยิงไว้ใน <head> มาใช้เลย!!
    const fetchReq = window.earlyDataPromise 
        ? window.earlyDataPromise 
        : fetch(`${gasApiUrl}?v=2&cid=${encodeURIComponent(cid)}`).then(res => res.json());

    return fetchReq.then(result => {
        window.earlyDataPromise = null; // เคลียร์ทิ้ง
        
        if(!result || result.status !== 'success' || !result.data || result.data.length === 0) { 
            showNoResult(result ? result.request : null); 
            return; 
        }
        
        let userLangFromDB = (result.lang || result.userLang || "EN").toUpperCase(); 
        if (!['TH', 'EN', 'CN'].includes(userLangFromDB)) userLangFromDB = "EN";

        currentLang = userLangFromDB; 
        document.getElementById('lang-select').value = currentLang;
              
        userContactMethod = result.contactMethod || ""; 
        userLineUid = result.lineUid || "";
        userLineId = result.lineId || "";      
        userWhatsapp = result.whatsapp || "";  
        alreadyRequestedIds = result.requestedIds ? result.requestedIds.split(',').map(id => String(id).trim()) : [];
        
        if (result.request) {
            let r = result.request; let reqParts = []; 
            let zoneTxt = r.zones ? r.zones : "Bangkok"; reqParts.push(`@${zoneTxt}`);
            let bMin = parseInt(r.budgetMin) || 0; let bMax = parseInt(r.budgetMax) || 0;
            if (bMin > 0 && bMax > 0) {
                let minTxt = (bMin >= 1000 && bMin % 1000 === 0) ? (bMin/1000) + 'k' : bMin.toLocaleString();
                let maxTxt = (bMax >= 1000 && bMax % 1000 === 0) ? (bMax/1000) + 'k' : bMax.toLocaleString();
                reqParts.push(`Budget ฿${minTxt} - ${maxTxt}`);
            } else if (bMax > 0) {
                let maxTxt = (bMax >= 1000 && bMax % 1000 === 0) ? (bMax/1000) + 'k' : bMax.toLocaleString();
                reqParts.push(`Budget ฿${maxTxt}`);
            }
            reqMonths = parseInt(r.contract) || reqMonths; reqParts.push(`${reqMonths} Months`);
            document.getElementById('final-req-text').innerText = reqParts.join(' | ');
        } else {
            document.getElementById('final-req-text').innerText = `@Bangkok | ${reqMonths} Months`;
        }

        let interestedIds = result.interestedIds ? result.interestedIds.split(',').map(id => String(id).trim()) : [];
        if (interestedIds.length > 0) {
            result.data.sort((a, b) => {
            const aInt = interestedIds.includes(String(a.id));
            const bInt = interestedIds.includes(String(b.id));
            if (aInt && !bInt) return -1;
            if (!aInt && bInt) return 1; 
            return 0;
            });
        }
        loadedProperties = result.data; 

        if (typeof selectedIndices !== 'undefined') {
            selectedIndices.clear();
            loadedProperties.forEach((p, idx) => {
                if (interestedIds.includes(String(p.id))) { selectedIndices.add(idx); }
            });
        }

        if (typeof changeLanguageAndCurrency === "function") {
            changeLanguageAndCurrency(currentLang);
        }

        revealContent(document.getElementById('final-req-text').innerText);
    })
    .catch(err => {
        console.error("🔥 FETCH ERROR: ", err);
        showNoResult(); 
    });
}

function showNoResult(requestData) {
    document.getElementById('loading-container').style.display = 'none';
    document.getElementById('property-container').style.display = 'block';
    
    let chatMessage = encodeURIComponent(`Hi Nebles, I need help finding a property. [Ref:${cid}]`);
    
    if (requestData) {
        let details = [];
        if (requestData.zones && requestData.zones !== "-") details.push(`📍 Zone: ${requestData.zones}`);
        let bMin = parseInt(requestData.budgetMin) || 0;
        let bMax = parseInt(requestData.budgetMax) || 0;
        if (bMin > 0 && bMax > 0) details.push(`💰 Budget: ฿${bMin.toLocaleString()} - ฿${bMax.toLocaleString()}`);
        else if (bMax > 0) details.push(`💰 Budget: Max ฿${bMax.toLocaleString()}`);
        
        let contract = parseInt(requestData.contract) || reqMonths || 12;
        details.push(`📝 Contract: ${contract} Months`);
        
        if (requestData.unitType && requestData.unitType !== "-") details.push(`🛏️ Type: ${requestData.unitType}`);
        if (requestData.size && requestData.size !== "-") details.push(`📐 Size: ${requestData.size} sqm`);
        if (requestData.pet && requestData.pet !== "-" && requestData.pet.toLowerCase() !== "no") {
            details.push(`🐕 Pet: ${requestData.pet}`);
        }

        let rawMsg = `Hi Nebles, I'm looking for a property with these criteria:\n\n${details.join('\n')}\n\nCould you please help me find one? [Ref:${cid}]`;
        chatMessage = encodeURIComponent(rawMsg);
    }

    document.getElementById('property-container').innerHTML = `
    <div style="background: #fff; border-radius: 20px; padding: 40px 24px; text-align: center; border: 1px solid #f0f0f0; box-shadow: 0 10px 30px rgba(0,0,0,0.04); margin-top: 20px;">
        <div style="width: 70px; height: 70px; background: #fff0f2; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px auto;">
        <i class="bi bi-search" style="font-size: 2rem; color: #FF385C;"></i>
        </div>
        <h3 style="font-weight: 700; color: #222; margin-bottom: 12px; font-size: 1.4rem;">No Properties Found</h3>
        <p style="color: #717171; font-size: 0.95rem; line-height: 1.6; margin-bottom: 32px;">
        It seems that the properties matching your criteria have just been rented out or are currently unavailable.<br><br>
        <span style="color: #222; font-weight: 600;">Let our experts help you find a new one!</span>
        </p>
        
        <a href="https://line.me/R/oaMessage/@needhome_th/?${chatMessage}" target="_blank" 
            style="display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; background-color: #00c300; color: #ffffff; padding: 14px 24px; border-radius: 12px; font-weight: 600; font-size: 1.05rem; text-decoration: none; transition: 0.2s; box-shadow: 0 4px 15px rgba(0, 195, 0, 0.2);">
        <i class="bi bi-line" style="font-size: 1.2rem;"></i> Chat with Nebles
        </a>
        <div style="margin-top: 16px; font-size: 0.8rem; color: #9ca3af;">We typically reply within 5 minutes</div>
    </div>`;
}

function getNewSelectedIndices() {
    return Array.from(selectedIndices).filter(idx => {
    let p = loadedProperties[idx];
    let pid = String(p.id || p.submissionId);
    return !alreadyRequestedIds.includes(pid) && !(p.status && p.status.toLowerCase() === "unavailable");
    });
}

function renderProperties() {
    let html = '';
    const itemsToShow = loadedProperties.slice(0, displayLimit);
    const t = i18n[currentLang]; 
    
    let curRate = 1;
    let curSymbol = "฿";
    if (currentLang === "EN") { curRate = exchangeRates.USD; curSymbol = "$"; }
    else if (currentLang === "CN") { curRate = exchangeRates.CNY; curSymbol = "¥"; }
    
    itemsToShow.forEach((prop, i) => {
        const isSelected = selectedIndices.has(i);
        const isUnavailable = (prop.status && prop.status.toLowerCase() === "unavailable");
        const propId = String(prop.id || prop.submissionId).trim();
        const isRequested = alreadyRequestedIds.includes(propId);
        
        let imagesHtml = '';
        if(prop.imageIds && prop.imageIds.length > 0) {
            prop.imageIds.slice(0, 5).forEach((img, j) => {
                // 🚨 [อัปเกรด] ลดขนาดรูปเป็น w600 เร็วขึ้น 3 เท่า!
                imagesHtml += `<div class="carousel-item ${j === 0 ? 'active' : ''} h-100"><img src="https://drive.google.com/thumbnail?id=${img}&sz=w600" loading="lazy"></div>`;
            });
        } else {
            imagesHtml = `<div class="carousel-item active h-100"><div class="d-flex align-items-center justify-content-center h-100 bg-light text-muted">No Image</div></div>`;
        }
        
        let carouselControls = (prop.imageIds && prop.imageIds.length > 1) ? `<button class="carousel-control-prev" type="button" data-bs-target="#carousel-${i}" data-bs-slide="prev"><span class="carousel-control-prev-icon"></span></button><button class="carousel-control-next" type="button" data-bs-target="#carousel-${i}" data-bs-slide="next"><span class="carousel-control-next-icon"></span></button>` : '';

        let stationName = "N/A";
        if (prop.bts1 && prop.bts1 !== "No Rail Nearby" && prop.bts1 !== "-" && prop.bts1 !== "WAITING...") {
            stationName = prop.bts1.includes('-') ? prop.bts1.substring(prop.bts1.indexOf('-') + 1).trim() : prop.bts1;
        }

        let mapUrl = (prop.placeId && prop.placeId !== "") 
            ? `http://googleusercontent.com/maps.google.com/?q=${encodeURIComponent(prop.project)}&query_place_id=${prop.placeId}` 
            : `http://googleusercontent.com/maps.google.com/?q=${encodeURIComponent(prop.project)}`;

        let mapBtn = `<a href="${mapUrl}" target="_blank" class="btn-action-sm"><i class="bi bi-map"></i> ${t.map}</a>`;
        let chatBtn = isUnavailable 
          ? `<button class="btn-action-sm" disabled><i class="bi bi-x-circle"></i> ${t.rented}</button>` 
          : `<button onclick="openSingleChatModal(${i})" class="btn-action-sm"><i class="bi bi-chat-dots"></i> ${t.chat}</button>`;

        let selectBtnHtml = isRequested || isUnavailable ? '' : `<button class="btn-select" onclick="toggleSelect(${i})"><i class="bi ${isSelected ? 'bi-heart-fill' : 'bi-heart'}"></i></button>`;
        
        let requestedStripHtml = isRequested && !isUnavailable ? `
          <div class="requested-strip">
            <div class="requested-strip-text">${t.bookingCheck}</div>
          </div>` : '';

        let unavailableBadge = isUnavailable ? `<div class="unavailable-badge">${t.rented}</div>` : '';

        let petBadgeHtml = '';
        if (prop.petPolicy && String(prop.petPolicy).trim() === "Pet Friendly") {
             petBadgeHtml = `<div class="pet-badge"><i class="bi bi-suit-heart-fill"></i> ${t.petFriendly}</div>`;
        }

        let pShort = prop.prices && prop.prices.short ? parseFloat(prop.prices.short) : 0;
        let pMid = prop.prices && prop.prices.mid ? parseFloat(prop.prices.mid) : 0;
        let pLong = prop.prices && prop.prices.long ? parseFloat(prop.prices.long) : 0;

        let finalPriceTHB = 0; let isExactTier = true; let termLabel = "";

        if (reqMonths <= 3) {
            if (pShort > 0) { finalPriceTHB = pShort; isExactTier = true; termLabel = "1-5 Months"; }
            else if (pMid > 0) { finalPriceTHB = pMid; isExactTier = false; termLabel = "6-11 Months"; }
            else if (pLong > 0) { finalPriceTHB = pLong; isExactTier = false; termLabel = "1 Year+"; }
        } 
        else if (reqMonths <= 5) {
            if (pShort > 0) { finalPriceTHB = pShort; isExactTier = true; termLabel = "1-5 Months"; }
            else if (pMid > 0) { finalPriceTHB = pMid; isExactTier = false; termLabel = "6-11 Months"; }
            else if (pLong > 0) { finalPriceTHB = pLong; isExactTier = false; termLabel = "1 Year+"; }
        } 
        else if (reqMonths <= 11) {
            if (pMid > 0) { finalPriceTHB = pMid; isExactTier = true; termLabel = "6-11 Months"; }
            else if (pLong > 0) { finalPriceTHB = pLong; isExactTier = false; termLabel = "1 Year+"; }
            else if (pShort > 0) { finalPriceTHB = pShort; isExactTier = false; termLabel = "1-5 Months"; }
        } 
        else {
            if (pLong > 0) { finalPriceTHB = pLong; isExactTier = true; termLabel = "1 Year+"; }
            else if (pMid > 0) { finalPriceTHB = pMid; isExactTier = false; termLabel = "6-11 Months"; }
            else if (pShort > 0) { finalPriceTHB = pShort; isExactTier = false; termLabel = "1-5 Months"; }
        }

        if (finalPriceTHB === 0) {
            finalPriceTHB = pLong > 0 ? pLong : (pMid > 0 ? pMid : pShort);
            isExactTier = false; termLabel = "Available Term";
        }

        let convertedPriceHtml = "";
        if (currentLang !== "TH") {
            let convertedPrice = Math.round(finalPriceTHB * curRate);
            convertedPriceHtml = `<span style="font-size: 0.85rem; color: #717171; font-weight: 500; margin-left: 6px;">(~ ${curSymbol}${convertedPrice.toLocaleString()})</span>`;
        }

        let priceDisplayHtml = "";
        if (isExactTier === false) {
          priceDisplayHtml = `
            <div class="price-wrap" style="display: flex; flex-direction: column; align-items: flex-start; gap: 0; margin-bottom: 12px;">
              <div style="display: flex; align-items: baseline; gap: 6px;">
                <span class="price-amt">฿${parseInt(finalPriceTHB).toLocaleString()}</span>
                <span class="price-label">/ ${t.month}</span>
                ${convertedPriceHtml} 
              </div>
              <div style="font-size: 0.75rem; color: #E31C5F; font-weight: 500; line-height: 1.3; margin-top: 4px; background: #fff0f2; padding: 6px 10px; border-radius: 6px; border: 1px solid #ffd1d9;">
                <i class="bi bi-info-circle me-1"></i> ${t.priceInfo} ${termLabel}
              </div>
            </div>`;
        } else {
          priceDisplayHtml = `
            <div class="price-wrap" style="display: flex; align-items: baseline; gap: 6px; margin-bottom: 12px;">
              <span class="price-amt">฿${parseInt(finalPriceTHB).toLocaleString()}</span>
              <span class="price-label">/ ${t.month} <span style="font-size: 0.8rem; color: #9ca3af; font-weight: 500;">(${t.priceFor} ${termLabel})</span></span>
              ${convertedPriceHtml}
            </div>`;
        }

        let cardBookingBtnHtml = "";
        if (isUnavailable) {
            cardBookingBtnHtml = `<button class="btn-card-booking" disabled style="background-color: #f3f4f6; color: #9ca3af;"><i class="bi bi-x-circle"></i> ${t.rented}</button>`;
        } else if (isRequested) {
            cardBookingBtnHtml = `<button class="btn-card-booking" disabled style="background-color: #fff0f2; color: #FF385C; border: 1px solid #ffd1d9; opacity: 0.75; cursor: not-allowed;"><i class="bi bi-check2-circle"></i> Requested</button>`;
        } else {
            cardBookingBtnHtml = `<button class="btn-card-booking" onclick="bookSingleRoom(${i})"><i class="bi bi-calendar-check"></i> ${t.requestBooking}</button>`;
        }

        html += `
          <div class="property-card ${isSelected ? 'selected-card' : ''} ${isUnavailable ? 'unavailable-card' : ''}">
            <div class="card-img-wrapper">
              ${requestedStripHtml} ${unavailableBadge}
              ${petBadgeHtml}
              <div class="match-badge"><i class="bi bi-stars"></i> ${t.match} ${prop.score}%</div>
              ${selectBtnHtml}
              <div id="carousel-${i}" class="carousel slide h-100" data-bs-ride="false">
                <div class="carousel-inner h-100">${imagesHtml}</div>
                ${carouselControls}
              </div>
            </div>
            <div class="card-body-premium">
              <div class="project-header" style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px;">
                <div style="font-size: 1.2rem; font-weight: 600; line-height: 1.3; color: #222;">${prop.project || "Unknown Project"}</div>
                <div class="action-btn-group" style="display: flex; gap: 8px;">${chatBtn}${mapBtn}</div>
              </div>
              <div class="location-text"><i class="bi bi-geo-alt"></i> ${prop.zone || "-"}</div>
              
              ${priceDisplayHtml}
              
              <div class="specs-inline">
                <span>${prop.unitType || "Studio"}</span><i class="bi bi-circle-fill spec-dot"></i>
                <span>${t.size} ${prop.size} ${t.sqm}</span><i class="bi bi-circle-fill spec-dot"></i>
                <span>${t.floor}: ${prop.floor}</span>
              </div>
              <div class="amenities-row">
                <span><i class="bi bi-train-front"></i> ${stationName} (${prop.dist1}m)</span>
              </div>
              
              ${cardBookingBtnHtml}
            </div>
        </div>`;
    });

    document.getElementById('property-container').innerHTML = html;
    document.getElementById('load-more-container').style.display = loadedProperties.length > displayLimit ? 'block' : 'none';
    updateFloatingBar();
}

function updateFloatingBar() {
  const bar = document.getElementById('floating-bar');
  let newSelectionCount = getNewSelectedIndices().length;
  const t = i18n[currentLang]; 

  if (newSelectionCount > 0) {
    document.getElementById('selected-count').innerText = `${newSelectionCount} ${t.selected}`;
    bar.classList.add('show');
  } else { 
    bar.classList.remove('show'); 
  }
}

function loadMore() { 
    displayLimit += 5; 
    renderProperties(); 
}

function toggleSelect(index) { 
    if (selectedIndices.has(index)) selectedIndices.delete(index); 
    else selectedIndices.add(index); 
    renderProperties(); 
}

function bookSingleRoom(index) { 
    selectedIndices.add(index); 
    renderProperties(); 
    openBookingModal(); 
}

    let currentActionType = ""; 
    let currentChatRoomId = "";
    let currentChatProject = "";

    function processActionFlow() {
      var bookingModal = bootstrap.Modal.getOrCreateInstance(document.getElementById('bookingModal'));
      let method = userContactMethod ? userContactMethod.trim().toLowerCase() : "";

      if (method !== 'line' && method !== 'whatsapp') {
        showChooseState();
        bookingModal.show();
      } 
      else {
        let channel = (method === 'line') ? 'Line' : 'WhatsApp';
        
        if (channel === 'Line') {
          if (typeof userLineUid !== 'undefined' && userLineUid && userLineUid !== '-') {
             showLoadingState();
             bookingModal.show();
             setTimeout(() => { redirectToApp('Line'); }, 1500);
          } 
          else if (!userLineId || userLineId === '-') {
             showInputState('Line', 'Line ID');
             bookingModal.show();
          } 
          else {
             showLoadingState();
             bookingModal.show();
             setTimeout(() => { redirectToApp('Line'); }, 1500);
          }
        } 
        else if (channel === 'WhatsApp') {
          if (!userWhatsapp || userWhatsapp === '-') {
            showInputState('WhatsApp', 'WhatsApp Number');
            bookingModal.show();
          } else {
            showLoadingState();
            bookingModal.show();
            setTimeout(() => { redirectToApp('WhatsApp'); }, 1500);
          }
        }
      }
    }

function openSingleChatModal(index) {
  let prop = loadedProperties[index];
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('by') === 'Public') {
      let msg = encodeURIComponent(`สวัสดีครับ สนใจห้อง ${prop.project} (รหัส: ${prop.id || prop.submissionId}) รบกวนเช็คให้หน่อยครับ`);
      window.location.href = `https://line.me/R/oaMessage/@needhome_th/?${msg}`;
      return; 
  }

  currentChatRoomId = prop.id || prop.submissionId;
  currentChatProject = prop.project;
  currentActionType = "chat";
  processActionFlow(); 
}

function openBookingModal() {
  if(getNewSelectedIndices().length === 0) return;
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('by') === 'Public') {
      let rooms = getNewSelectedIndices().map(i => `- ${loadedProperties[i].project} (รหัส: ${loadedProperties[i].id || loadedProperties[i].submissionId})`).join("\n");
      let msg = encodeURIComponent(`Hi Nebles, I am interested in:\n${rooms}\n\n`);
      window.location.href = `https://line.me/R/oaMessage/@needhome_th/?${msg}`;
      return; 
  }

  currentActionType = "booking";
  processActionFlow(); 
}

    function showLoadingState() {
      document.getElementById('modal-dynamic-body').innerHTML = `<div class="py-4"><div class="spinner-border mb-3" role="status" style="color: #FF385C;"></div><h5 class="fw-bold">Processing...</h5></div>`;
    }

    function showSuccessState(channel) {
      document.getElementById('modal-dynamic-body').innerHTML = `
        <div class="py-3">
          <div style="width: 60px; height: 60px; background: #fff0f2; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto;"><i class="bi bi-check-lg" style="font-size: 2rem; color: #FF385C;"></i></div>
          <h4 class="fw-bold">Success!</h4>
          <p class="text-muted">We are checking the availability for you.</p>
          <button id="btn-close-window" class="btn-channel mt-4" onclick="closeWindow()">Close Window</button>
        </div>`;
    }

    function showChooseState() {
      document.getElementById('modal-dynamic-body').innerHTML = `
        <h4 class="fw-bold">Contact Method</h4>
        <p class="text-muted">How would you like to contact us?</p>
        <button class="btn-channel mb-3" onclick="checkContactInfo('Line')"><i class="bi bi-line" style="color:#00c300;"></i> Contact via Line</button>
        <button class="btn-channel" onclick="checkContactInfo('WhatsApp')"><i class="bi bi-whatsapp" style="color:#25d366;"></i> Contact via WhatsApp</button>`;
    }

    function checkContactInfo(channel) {
      if (channel === 'Line' && !userLineId) showInputState(channel, 'Line ID');
      else if (channel === 'WhatsApp' && !userWhatsapp) showInputState(channel, 'WhatsApp Number');
      else showFallbackWarning(channel);
    }

    function showInputState(channel, placeholderTxt) {
      document.getElementById('modal-dynamic-body').innerHTML = `
        <h4 class="fw-bold">Contact Info Required</h4>
        <p class="text-muted">Please provide your ${channel} to proceed.</p>
        <input type="text" id="contact-input-value" class="form-control mb-3 p-2" style="border-radius:10px; border:1px solid #d1d5db;" placeholder="Enter your ${placeholderTxt}">
        <button class="btn-booking w-100" onclick="saveContactAndProceed('${channel}')">Save & Next <i class="bi bi-arrow-right"></i></button>`;
    }

    function saveContactAndProceed(channel) {
      let inputVal = document.getElementById('contact-input-value').value.trim();
      if (!inputVal) { alert("Please enter your details."); return; }
      if (channel === 'Line') userLineId = inputVal;
      if (channel === 'WhatsApp') userWhatsapp = inputVal;
      showFallbackWarning(channel);
    }

    function showFallbackWarning(channel) {
      document.getElementById('modal-dynamic-body').innerHTML = `
        <h4 class="fw-bold">Almost there!</h4>
        <p class="text-muted">Click next to send us a message.</p>
        <button class="btn-booking w-100" onclick="redirectToApp('${channel}')">Next <i class="bi bi-arrow-right"></i></button>`;
    }

    function redirectToApp(channel) {
      let btn = document.querySelector('.btn-booking');
      if(btn) { btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Connecting...'; btn.disabled = true; }

      let rooms = "";
      let apiPromise;
      if (currentActionType === "chat") {
        rooms = currentChatProject;
        apiPromise = sendInterestToGAS(channel, currentChatRoomId); 
      } else {
        rooms = getNewSelectedIndices().map(i => loadedProperties[i].project).join(", ");
        apiPromise = sendBookingToGAS(channel); 
      }
      
      let rawMsg = `Hi Nebles, I am interested in:\n${rooms}\n\n[Ref:${cid}]`;
      let msg = encodeURIComponent(rawMsg);
      
      let redirectUrl = channel.toLowerCase() === 'line' 
        ? `https://line.me/R/oaMessage/@needhome_th/?${msg}` 
        : `https://wa.me/66962435566?text=${msg}`;

      apiPromise
        .then(() => { window.location.href = redirectUrl; })
        .catch(err => { window.location.href = redirectUrl; });

      setTimeout(() => { window.location.href = redirectUrl; }, 1500);
    }

    function sendInterestToGAS(channel, roomId) {
      let contactIdVal = channel === 'Line' ? userLineId : userWhatsapp;
      return fetch(gasApiUrl, { 
        method: 'POST', mode: 'no-cors',
        body: JSON.stringify({ action: "updateInterest", cid: cid, channel: channel, contactId: contactIdVal, roomId: roomId }) 
      });
    }

    function sendBookingToGAS(channel) {
      let ids = getNewSelectedIndices().map(i => loadedProperties[i].id || loadedProperties[i].submissionId).join(", ");
      let contactIdVal = channel === 'Line' ? userLineId : userWhatsapp;
      return fetch(gasApiUrl, { 
        method: 'POST', mode: 'no-cors',
        body: JSON.stringify({ action: "updateBooking", cid: cid, channel: channel, contactId: contactIdVal, requestedIds: ids }) 
      });
    }

    function closeWindow() {
      window.close(); 
      document.getElementById('btn-close-window').style.display = 'none';
      document.getElementById('modal-dynamic-body').innerHTML += `<p class="mt-3 text-muted">Please tap the 'X' to return to chat.</p>`;
    }

    // ==========================================
    // 🚀 เริ่มทำงานทันทีที่โครง HTML โหลดเสร็จ (ไม่ต้องรอรูปหรือฟอนต์!)
    // ==========================================
    document.addEventListener('DOMContentLoaded', () => {
        parseInitialReq(); 

        // 🚨 ลั่นไกดึงข้อมูลห้องจาก GAS ทันที! (ไม่รอสิ่งใดทั้งสิ้น)
        const fetchPropertiesPromise = fetchData(); 

        // ลั่นไกดึงเรทเงินคู่ขนานกันไปเลย (ไม่ให้ขวางทางกัน)
        fetchExchangeRates();

        // ส่วนของการส่ง Log ว่ามีคนเปิดดู
        const urlParams = new URLSearchParams(window.location.search);
        const cidParam = urlParams.get('cid');
        const byParam = urlParams.get('by');

        let viewedBy = 'Customer';
        if (byParam === 'admin') viewedBy = 'Admin';
        else if (byParam === 'Public') viewedBy = 'Public';

        if (viewedBy === 'Public') {
            console.log("🔥 [Public Mode] ผู้เข้าชมจาก Social Network");
        }

        // 🚨 [แก้ใหม่] ถ่วงเวลาส่ง Log ไป 3 วินาที! เพื่อไม่ให้มันไปแย่งคิว GET ดึงข้อมูลหน้าเว็บ!
        setTimeout(() => {
            if (cidParam && cidParam !== "Guest" && viewedBy !== 'Public') {
                fetch(gasApiUrl, { 
                    method: 'POST', 
                    mode: 'no-cors',
                    body: JSON.stringify({ action: "view_catalog", cid: cidParam, actorType: viewedBy }) 
                }).catch(err => console.log("Silent Log Error:", err)); 
            }
        }, 3000);
    });
  </script>
