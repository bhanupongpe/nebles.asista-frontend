  <link rel="preconnect" href="https://drive.google.com">

    const earlyParams = new URLSearchParams(window.location.search);
    const earlyCampId = earlyParams.get('campId');
    if (earlyCampId) {
       window.earlyDataPromise = fetch(`${earlyGasApiUrl}?campId=${encodeURIComponent(earlyCampId)}`).then(res => res.json()).catch(err => null);
    }
  </script>

    .req-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; color: #222; }
    .req-subtitle { font-size: 0.95rem; color: #717171; line-height: 1.5; margin-bottom: 0 !important; }

    .action-btn-group { display: flex; gap: 6px; }
    .btn-action-sm { font-size: 0.75rem; text-decoration: none; color: #4b5563; background: #f3f4f6; padding: 6px 12px; border-radius: 20px; border: none; display: flex; align-items: center; gap: 4px; font-weight: 600; cursor: pointer; }
    .card-body-premium { padding: 20px; }
    .location-text { font-size: 0.95rem; color: #717171; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

    .price-amt { font-size: 1.35rem; font-weight: 700; color: #222; }

    function populateCountryCodes() {
      const select = document.getElementById('campWaCode');
      let html = '';
      countryCodes.forEach(cc => { html += `<option value="${cc.d}">${cc.c} ${cc.d}</option>`; });
      select.innerHTML = html;
    }

    async function fetchExchangeRates() {
        try {
            const res = await fetch('https://api.exchangerate-api.com/v4/latest/THB');
            const data = await res.json();
            exchangeRates.USD = data.rates.USD;
            exchangeRates.CNY = data.rates.CNY;
        } catch (e) {}
    }

    function changeLanguageAndCurrency(langCode) {
        currentLang = langCode;
        const t = i18n[currentLang];
        
        document.getElementById('loading-msg-state').innerText = t.loading;
        document.getElementById('modal-title').innerText = t.modalTitle;
        document.getElementById('modal-desc').innerText = t.modalDesc;
        document.getElementById('lbl-name').innerText = t.name;
        document.getElementById('lbl-contact').innerText = t.contact;
        document.getElementById('btn-submit-txt').innerText = t.submit;
        document.getElementById('success-title').innerText = t.sTitle;
        document.getElementById('success-desc').innerText = t.sDesc;
        document.getElementById('lbl-line-err').innerText = t.lineErr;
        document.getElementById('campCusName').placeholder = t.plName;
        document.getElementById('campCusWaNum').placeholder = t.plPhone;

        if (loadedProperties.length > 0) renderProperties();
    }

    // ==========================================
    // 🎨 UI Reveal
    // ==========================================
    function revealContent() {
        document.getElementById('loading-container').style.display = 'none';
        document.getElementById('property-container').style.display = 'block';
        renderProperties();
    }

    // ==========================================
    // 📥 Fetch Data
    // ==========================================
    document.addEventListener('DOMContentLoaded', () => {
        populateCountryCodes(); 
        if(!campId) {
            document.getElementById('loading-container').innerHTML = "<h4>Invalid Link</h4>";
            return;
        }

        fetchExchangeRates();

        const fetchReq = window.earlyDataPromise 
            ? window.earlyDataPromise 
            : fetch(`${gasApiUrl}?campId=${encodeURIComponent(campId)}`).then(res => res.json());

        fetchReq.then(result => {
            window.earlyDataPromise = null;
            document.getElementById('loading-container').style.display = 'none';

            if(!result || result.status !== 'success' || !result.data || result.data.length === 0) {
                document.getElementById('property-container').innerHTML = `
                <div style="background: #fff; border-radius: 20px; padding: 40px 24px; text-align: center; border: 1px solid #f0f0f0; margin-top: 20px;">
                    <i class="bi bi-search" style="font-size: 2.5rem; color: #FF385C; margin-bottom:15px; display:block;"></i>
                    <h3 style="font-weight: 700; color: #222;">No Properties Found</h3>
                </div>`;
                document.getElementById('property-container').style.display = 'block';
                return;
            }

            loadedProperties = result.data;
            campaignName = result.campTitle || "Special Collection"; // เก็บชื่อแคมเปญไว้ใช้ส่งเข้า Sheet
            
            // 🚨 ดึง Title กับ Desc มาโชว์เป็นหัวเว็บ!
            document.getElementById('page-title').innerText = result.campTitle || "Special Offers";
            document.getElementById('page-subtitle').innerText = result.campDesc || "";
            
            changeLanguageAndCurrency(currentLang); 
            revealContent(); 
        }).catch(err => {
            document.getElementById('loading-container').innerHTML = "<h4>Error connecting to server</h4>";
        });
    });

        const t = i18n[currentLang]; 
        let curRate = 1;
        let curSymbol = "฿";
        if (currentLang === "EN") { curRate = exchangeRates.USD; curSymbol = "$"; }
        else if (currentLang === "CN") { curRate = exchangeRates.CNY; curSymbol = "¥"; }
        
        loadedProperties.forEach((prop, i) => {
            let imagesHtml = '';
            if(prop.imageIds && prop.imageIds.length > 0) {
                prop.imageIds.slice(0, 5).forEach((img, j) => {
                    imagesHtml += `<div class="carousel-item ${j === 0 ? 'active' : ''} h-100"><img src="https://drive.google.com/thumbnail?id=${img}&sz=w600" loading="lazy"></div>`;
                });
            } else {
                imagesHtml = `<div class="carousel-item active h-100"><div class="d-flex align-items-center justify-content-center h-100 bg-light text-muted">No Image</div></div>`;
            }
            let carouselControls = (prop.imageIds && prop.imageIds.length > 1) ? `<button class="carousel-control-prev" type="button" data-bs-target="#carousel-${i}" data-bs-slide="prev"><span class="carousel-control-prev-icon"></span></button><button class="carousel-control-next" type="button" data-bs-target="#carousel-${i}" data-bs-slide="next"><span class="carousel-control-next-icon"></span></button>` : '';

            let mapUrl = (prop.placeId && prop.placeId !== "") ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(prop.project)}&query_place_id=${prop.placeId}` : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(prop.project)}`;
            let mapBtn = `<a href="${mapUrl}" target="_blank" class="btn-action-sm"><i class="bi bi-map"></i> ${t.map}</a>`;
            let chatBtn = `<button onclick="openLeadModal(${i})" class="btn-action-sm"><i class="bi bi-chat-dots"></i> ${t.chat}</button>`;

            let petBadgeHtml = (prop.petPolicy && String(prop.petPolicy).trim() === "Pet Friendly") ? `<div class="pet-badge"><i class="bi bi-suit-heart-fill"></i> ${t.petFriendly}</div>` : '';

            let pShort = prop.prices && prop.prices.short ? parseFloat(prop.prices.short) : 0;
            let pMid = prop.prices && prop.prices.mid ? parseFloat(prop.prices.mid) : 0;
            let pLong = prop.prices && prop.prices.long ? parseFloat(prop.prices.long) : 0;
            let finalPriceTHB = pLong > 0 ? pLong : (pMid > 0 ? pMid : pShort);

            let convertedPriceHtml = "";
            if (currentLang !== "TH") {
                let convertedPrice = Math.round(finalPriceTHB * curRate);
                convertedPriceHtml = `<span style="font-size: 0.85rem; color: #717171; font-weight: 500; margin-left: 6px;">(~ ${curSymbol}${convertedPrice.toLocaleString()})</span>`;
            }

            let stationName = "N/A";
            if (prop.bts1 && prop.bts1 !== "No Rail Nearby" && prop.bts1 !== "-" && prop.bts1 !== "WAITING...") {
                stationName = prop.bts1.includes('-') ? prop.bts1.substring(prop.bts1.indexOf('-') + 1).trim() : prop.bts1;
            }
            let stationHtml = (stationName !== "N/A") ? `<div class="amenities-row"><span><i class="bi bi-train-front"></i> ${stationName} (${prop.dist1}m)</span></div>` : '';

            html += `
              <div class="property-card">
                <div class="card-img-wrapper">
                  ${petBadgeHtml}
                  <div class="match-badge"><i class="bi bi-fire"></i> ${t.match}</div>
                  <div id="carousel-${i}" class="carousel slide h-100" data-bs-ride="false">
                    <div class="carousel-inner h-100">${imagesHtml}</div>
                    ${carouselControls}
                  </div>
                </div>
                <div class="card-body-premium">
                  <div style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px;">
                    <div style="font-size: 1.2rem; font-weight: 600; line-height: 1.3; color: #222;">${prop.project || "Condo"}</div>
                    <div class="action-btn-group" style="display: flex; gap: 8px;">${chatBtn}${mapBtn}</div>
                  </div>
                  <div class="location-text"><i class="bi bi-geo-alt"></i> ${prop.zone || "-"}</div>
                  
                  <div class="price-wrap" style="display: flex; align-items: baseline; gap: 6px; margin-bottom: 16px;">
                    <span class="price-amt">฿${parseInt(finalPriceTHB).toLocaleString()}</span>
                    <span class="price-label">/ ${t.month}</span>
                    ${convertedPriceHtml}
                  </div>
                  
                  <div class="specs-inline">
                    <span>${prop.unitType || "Studio"}</span><i class="bi bi-circle-fill spec-dot"></i>
                    <span>${t.size} ${prop.size} ${t.sqm}</span><i class="bi bi-circle-fill spec-dot"></i>
                    <span>${t.floor}: ${prop.floor}</span>
                  </div>
                  
                  ${stationHtml}
                  
                  <button class="btn-card-booking" onclick="openLeadModal(${i})"><i class="bi bi-check2-circle"></i> ${t.requestBooking}</button>
                </div>
            </div>`;
        });
        
        document.getElementById('property-container').innerHTML = html;
    }

    let leadModalObj;
    function openLeadModal(index) {
        if(!leadModalObj) leadModalObj = new bootstrap.Modal(document.getElementById('campaignLeadModal'));
        document.getElementById('campLeadStep1').style.display = 'block';
        document.getElementById('campLeadStep2').style.display = 'none';
        
        const room = loadedProperties[index];
        document.getElementById('campTargetRoom').value = `${room.project} (ID: ${room.id})`;
        leadModalObj.show();
    }

    function submitCampaignLead() {
        const name = document.getElementById('campCusName').value.trim();
        const line = document.getElementById('campCusLine').value.trim();
        const waNum = document.getElementById('campCusWaNum').value.trim();
        const t = i18n[currentLang];
        
        if (!name) return alert(t.alertName);
        if (!line && !waNum) return alert(t.alertContact);

        const btn = document.getElementById('btnSubmitCamp');
        const orgText = btn.innerHTML;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Processing...';
        btn.disabled = true;

        const targetRoom = document.getElementById('campTargetRoom').value;
        const fullWa = waNum ? document.getElementById('campWaCode').value + waNum.replace(/^0+/, '') : "";

        const payload = {
            action: "savePublicLead",
            campaignName: campaignName,
            roomId: targetRoom,
            name: name,
            lineId: line,
            whatsapp: fullWa,
            utm_source: utmSource,
            utm_medium: utmMedium,
            utm_campaign: utmCampaign
        };

        fetch(gasApiUrl, { method: 'POST', body: JSON.stringify(payload) })
        .then(res => res.json())
        .then(() => { 
            btn.innerHTML = orgText; btn.disabled = false;
            showSuccess(line, fullWa, targetRoom); 
        })
        .catch(() => { 
            btn.innerHTML = orgText; btn.disabled = false;
            showSuccess(line, fullWa, targetRoom); 
        });
    }

    function showSuccess(hasLine, hasWa, roomDetails) {
        document.getElementById('campLeadStep1').style.display = 'none';
        document.getElementById('campLeadStep2').style.display = 'block';
        
        const t = i18n[currentLang];
        let msg = encodeURIComponent(`Hello, I'm interested in ${roomDetails} (Ref: ${campaignName})`);
        if (currentLang === "TH") msg = encodeURIComponent(`สวัสดีค่ะ สนใจห้อง ${roomDetails} (จากแคมเปญ: ${campaignName})`);
        if (currentLang === "CN") msg = encodeURIComponent(`你好，我对 ${roomDetails} 感兴趣 (Ref: ${campaignName})`);

        let btns = "";
        
        if (hasLine) {
            btns += `<a href="https://line.me/R/oaMessage/@needhome_th/?${msg}" target="_blank" class="btn btn-lg w-100 mb-3 fw-bold shadow-sm" style="background-color:#00c300; color:white; border-radius:12px;"><i class="bi bi-line"></i> ${t.chatLine}</a>`;
        }
        if (hasWa) {
            btns += `<a href="https://wa.me/66962435566?text=${msg}" target="_blank" class="btn btn-lg w-100 fw-bold shadow-sm" style="background-color:#25D366; color:white; border-radius:12px;"><i class="bi bi-whatsapp"></i> ${t.chatWa}</a>`;
        }
        document.getElementById('dynamicAppButtons').innerHTML = btns;
    }
  </script>
</body>
</html>
